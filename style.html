<!DOCTYPE html>
<html lang="en">
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styled HTML Page</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #07520e;
            color: #370afd;
        }

        header {
            background: #f78949;
            color: rgb(20, 49, 104);
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
        }

        nav a:hover {
            color: #4CAF50;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn {
            display: inline-block;
            background: #f57906;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #45a049;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
        <p>Simple HTML + CSS Example</p>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <div class="container">
        <h2>Hello!</h2>
        <p>
            This is a simple styled HTML page using internal CSS.
            You can customize the colors, fonts, and layout as needed.
        </p>

        <a href="https://sahrdaya.ac.in/" class="btn">Learn More</a>
        
    </div>

    <footer>
        &copy; 2026 My Website. All rights reserved.
    </footer>

</body>
</html>
